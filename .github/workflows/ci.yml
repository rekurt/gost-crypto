name: CI

on:
  push:
    branches: [master, dev]
  pull_request:
    branches: [master, dev]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.22', '1.23', 'stable']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libssl-dev cmake curl gcc g++ pkg-config make

      - name: Install gost-engine
        run: |
          chmod +x scripts/install-gost-engine.sh
          sudo scripts/install-gost-engine.sh

      - name: Configure OpenSSL for gost-engine
        run: |
          OSSL_MODULES=$(find /usr/lib -name "ossl-modules" -type d 2>/dev/null | head -1)
          if [ -z "$OSSL_MODULES" ]; then
            OSSL_MODULES="/usr/lib/ossl-modules"
          fi
          # Create a separate gost-engine config and prepend the openssl_conf line.
          OPENSSL_DIR=$(openssl version -d | sed 's/.*"\(.*\)"/\1/')
          OPENSSL_CNF="${OPENSSL_DIR}/openssl.cnf"
          # Write gost engine config snippet
          cat <<'GOSTCONF' | sudo tee "${OPENSSL_DIR}/gost.cnf" > /dev/null
          openssl_conf = openssl_def
          [openssl_def]
          engines = engine_section
          [engine_section]
          gost = gost_section
          [gost_section]
          engine_id = gost
          default_algorithms = ALL
          GOSTCONF
          # Fix indentation (remove leading spaces from heredoc)
          sudo sed -i 's/^          //' "${OPENSSL_DIR}/gost.cnf"
          # Set dynamic path after variable expansion
          sudo sed -i "/engine_id = gost/a dynamic_path = ${OSSL_MODULES}/gost.so" "${OPENSSL_DIR}/gost.cnf"
          # Prepend our config before the original openssl.cnf
          sudo cp "$OPENSSL_CNF" "${OPENSSL_CNF}.bak"
          cat "${OPENSSL_DIR}/gost.cnf" | sudo tee "$OPENSSL_CNF" > /dev/null
          echo "" | sudo tee -a "$OPENSSL_CNF" > /dev/null
          cat "${OPENSSL_CNF}.bak" | sudo tee -a "$OPENSSL_CNF" > /dev/null

      - name: Verify gost-engine loads
        run: openssl engine gost -t || echo "WARNING: gost-engine not loadable, tests will be skipped"

      - name: Build
        run: CGO_ENABLED=1 go build ./...

      - name: Test
        run: CGO_ENABLED=1 go test -race -count=1 -coverprofile=coverage.out ./...

      - name: Upload coverage
        if: matrix.go-version == 'stable'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.out
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Vet
        run: go vet ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libssl-dev pkg-config gcc

      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m
