name: CI

on:
  push:
    branches: [master, dev]
  pull_request:
    branches: [master, dev]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.22', '1.23', 'stable']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libssl-dev cmake curl gcc g++ pkg-config make git

      - name: Install gost-engine
        run: |
          chmod +x scripts/install-gost-engine.sh
          sudo scripts/install-gost-engine.sh

      - name: Configure OpenSSL for gost-engine
        run: |
          OSSL_MODULES=$(find /usr/lib -name "ossl-modules" -type d 2>/dev/null | head -1)
          [ -z "$OSSL_MODULES" ] && OSSL_MODULES="/usr/lib/ossl-modules"
          OPENSSL_DIR=$(openssl version -d | sed 's/.*"\(.*\)"/\1/')
          OPENSSL_CNF="${OPENSSL_DIR}/openssl.cnf"
          sudo cp "$OPENSSL_CNF" "${OPENSSL_CNF}.bak"
          printf 'openssl_conf = openssl_def\n[openssl_def]\nengines = engine_section\n[engine_section]\ngost = gost_section\n[gost_section]\nengine_id = gost\ndynamic_path = %s/gost.so\ndefault_algorithms = ALL\n\n' "$OSSL_MODULES" | sudo tee "$OPENSSL_CNF" > /dev/null
          cat "${OPENSSL_CNF}.bak" | sudo tee -a "$OPENSSL_CNF" > /dev/null

      - name: Verify gost-engine loads
        run: openssl engine gost -t

      - name: Build
        run: CGO_ENABLED=1 go build ./...

      - name: Test
        run: CGO_ENABLED=1 go test -race -count=1 -coverprofile=coverage.out ./...

      - name: Upload coverage
        if: matrix.go-version == 'stable'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.out
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Vet
        run: go vet ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libssl-dev pkg-config gcc

      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m
