name: Bug Report
description: Report a bug in gost-crypto
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: Minimal code or steps to reproduce the issue
      render: go
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened
    validations:
      required: true
  - type: input
    id: go-version
    attributes:
      label: Go Version
      placeholder: "e.g. 1.22.5"
    validations:
      required: true
  - type: input
    id: openssl-version
    attributes:
      label: OpenSSL Version
      placeholder: "e.g. 3.1.4"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "e.g. Ubuntu 22.04, macOS 14"
    validations:
      required: true
